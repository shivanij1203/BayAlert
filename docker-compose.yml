version: "3.8"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: bayalert-db
    environment:
      POSTGRES_USER: bayalert
      POSTGRES_PASSWORD: bayalert_dev
      POSTGRES_DB: bayalert
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bayalert-redis
    ports:
      - "6379:6379"

  api:
    build: ./backend
    container_name: bayalert-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml:/ml
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://bayalert:bayalert_dev@db:5432/bayalert
      REDIS_URL: redis://redis:6379/0

  worker:
    build: ./backend
    container_name: bayalert-worker
    command: celery -A app.tasks.worker worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./ml:/ml
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://bayalert:bayalert_dev@db:5432/bayalert
      REDIS_URL: redis://redis:6379/0

  beat:
    build: ./backend
    container_name: bayalert-beat
    command: celery -A app.tasks.worker beat --loglevel=info
    volumes:
      - ./backend:/app
      - ./ml:/ml
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://bayalert:bayalert_dev@db:5432/bayalert
      REDIS_URL: redis://redis:6379/0

volumes:
  pgdata:
